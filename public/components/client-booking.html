<!-- Sección Agendar Cita -->
<section id="agendar" class="py-20 md:py-32 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1532710093739-947053e4148a?q=80&w=1974&auto=format&fit=crop')">
    <div class="container mx-auto px-6">
        <div id="user-agenda-view">
            <div class="grid md:grid-cols-2 gap-12 items-center">
                <div class="text-white">
                    <h2 id="user-agenda-header" class="font-display text-4xl md:text-5xl font-bold mb-6 section-title">Agenda tu Cita</h2>
                    <p id="user-agenda-subtext" class="text-lg mb-4">Tu tiempo es valioso. Selecciona un día en el calendario para ver las horas disponibles.</p>
                </div>
                <div class="bg-black/80 backdrop-blur-sm p-8 rounded-lg shadow-2xl">
                    <div class="calendar">
                        <div class="month-header">
                            <button id="user-prev-month-btn" class="calendar-nav-btn">
                                <span class="material-icons">chevron_left</span>
                            </button>
                            <h2 id="user-month-year" class="calendar-month-title"></h2>
                            <button id="user-next-month-btn" class="calendar-nav-btn">
                                <span class="material-icons">chevron_right</span>
                            </button>
                        </div>
                        <div class="weekdays">
                            <div>Dom</div> <div>Lun</div> <div>Mar</div> <div>Mié</div> <div>Jue</div> <div>Vie</div> <div>Sáb</div>
                        </div>
                        <div id="user-calendar-grid" class="calendar-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
