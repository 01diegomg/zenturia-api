<!-- Modal: Booking / Reservación -->
<div id="booking-modal-container" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
        <button class="close-modal-btn">&times;</button>
        <h3 id="modal-title" class="font-display"></h3>

        <!-- Step 1: Selección de Barbero -->
        <div id="booking-step-1">
            <p class="text-gray-300 mb-4">Completa los siguientes pasos para tu reserva.</p>

            <div class="form-group">
                <label class="text-gray-300 font-semibold flex items-center gap-2">
                    <span class="step-number">1</span>
                    Elige tu Barbero:
                </label>
                <div id="barber-selection-container" class="barber-selection mt-2">
                    <!-- Los barberos se cargarán dinámicamente -->
                </div>
            </div>

            <div id="service-section" class="form-group hidden">
                <label class="text-gray-300 font-semibold flex items-center gap-2">
                    <span class="step-number">2</span>
                    Elige tu Ritual:
                </label>
                <div id="service-selection-container" class="space-y-3 mt-2"></div>
            </div>

            <div id="time-section" class="form-group hidden">
                <label class="text-gray-300 font-semibold flex items-center gap-2">
                    <span class="step-number">3</span>
                    Elige tu Hora:
                </label>
                <div id="time-slots-container" class="time-slots mt-2"></div>
            </div>

            <button id="booking-next-btn" class="modal-button mt-4" disabled>Siguiente</button>
        </div>

        <!-- Step 2: Login/Registro -->
        <div id="booking-step-2" class="hidden">
            <div id="client-login-view">
                <h3 class="font-display text-2xl mb-4">Acceso Cliente</h3>
                <p class="text-gray-400 mb-4">Inicia sesión para finalizar tu cita.</p>
                <div class="form-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" class="portal-input" placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" class="portal-input">
                </div>
                <button id="client-login-btn" class="modal-button">Iniciar Sesión y Confirmar</button>
                <p class="text-center my-4 text-gray-500">o</p>
                <button id="show-register-btn" class="w-full text-yellow-500 font-semibold">¿No tienes cuenta? Regístrate</button>
            </div>
            <div id="client-register-view" class="hidden">
                <h3 class="font-display text-2xl mb-4">Crea tu Cuenta para Confirmar</h3>
                <div class="form-group">
                    <label for="register-name">Nombre Completo</label>
                    <input type="text" id="register-name" class="portal-input" placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="register-email">Correo Electrónico</label>
                    <input type="email" id="register-email" class="portal-input">
                </div>
                <div class="form-group">
                    <label for="register-password">Crea una Contraseña</label>
                    <input type="password" id="register-password" class="portal-input" aria-describedby="password-requirements">
                    <div id="password-strength-container" class="password-strength-container hidden">
                        <div class="password-strength-bar">
                            <div id="password-strength-fill" class="password-strength-fill"></div>
                        </div>
                        <span id="password-strength-text" class="password-strength-text"></span>
                    </div>
                    <div id="password-requirements" class="password-requirements hidden">
                        <div class="password-requirement" data-req="length">
                            <span class="material-icons">radio_button_unchecked</span>
                            <span>Mínimo 8 caracteres</span>
                        </div>
                        <div class="password-requirement" data-req="lowercase">
                            <span class="material-icons">radio_button_unchecked</span>
                            <span>Una letra minúscula</span>
                        </div>
                        <div class="password-requirement" data-req="number">
                            <span class="material-icons">radio_button_unchecked</span>
                            <span>Un número</span>
                        </div>
                    </div>
                </div>
                <button id="client-register-btn" class="modal-button">Registrarse y Confirmar</button>
                <p class="text-center my-4 text-gray-500">o</p>
                <button id="show-login-btn" class="w-full text-yellow-500 font-semibold">¿Ya tienes cuenta? Inicia Sesión</button>
            </div>
        </div>

        <!-- Step 3: Resumen (para usuarios ya logueados) -->
        <div id="booking-step-3" class="hidden">
            <h3 class="font-display text-2xl mb-4">Confirma tu Cita</h3>
            <div id="booking-summary" class="booking-summary mb-6">
                <!-- El resumen se generará dinámicamente -->
            </div>
            <button id="confirm-booking-btn" class="modal-button">Confirmar Reservación</button>
        </div>
    </div>
</div>
