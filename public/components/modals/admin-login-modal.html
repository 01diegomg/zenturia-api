<!-- Modal: Admin Login -->
<div id="admin-login-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="admin-login-title">
    <div class="modal-content">
        <button class="close-modal-btn" aria-label="Cerrar modal">&times;</button>
        <h3 id="admin-login-title" class="font-display text-2xl mb-4">Acceso Administrador</h3>
        <div class="form-group">
            <label for="admin-user">Usuario</label>
            <input type="text" id="admin-user" class="portal-input">
        </div>
        <div class="form-group">
            <label for="admin-pass">Contraseña</label>
            <input type="password" id="admin-pass" class="portal-input">
        </div>
        <button id="admin-login-btn" class="modal-button">Ingresar</button>
    </div>
</div>
