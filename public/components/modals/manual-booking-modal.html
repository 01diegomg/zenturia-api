<!-- Modal: Manual Booking (Admin) -->
<div id="manual-booking-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-content max-w-lg">
        <button class="close-modal-btn">&times;</button>
        <h3 id="manual-booking-title" class="font-display text-2xl mb-6"></h3>
        <div class="space-y-4">
            <div class="form-group">
                <label for="manual-booking-service">Seleccionar Ritual</label>
                <select id="manual-booking-service" class="portal-input"></select>
            </div>
            <div class="form-group">
                <label for="manual-booking-name">Nombre del Cliente (Opcional)</label>
                <input type="text" id="manual-booking-name" class="portal-input" value="Cliente Presencial">
            </div>
            <button id="confirm-manual-booking-btn" class="modal-button mt-4">Confirmar y Agendar</button>
        </div>
    </div>
</div>
