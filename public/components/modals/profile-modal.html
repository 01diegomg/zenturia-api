<!-- Modal: Edición de Perfil -->
<div id="profile-modal" class="modal-overlay hidden">
    <div class="modal-content max-w-md">
        <button class="close-modal-btn">&times;</button>
        <h3 class="font-display text-2xl mb-6">Mi Perfil</h3>

        <form id="profile-form">
            <div class="form-group">
                <label for="profile-name">Nombre Completo</label>
                <input type="text" id="profile-name" class="portal-input" placeholder="Tu nombre">
            </div>

            <div class="form-group">
                <label for="profile-email">Correo Electrónico</label>
                <input type="email" id="profile-email" class="portal-input" disabled>
                <p class="text-xs text-gray-500 mt-1">El correo no se puede cambiar</p>
            </div>

            <div class="form-group">
                <label for="profile-phone">Teléfono</label>
                <input type="tel" id="profile-phone" class="portal-input" placeholder="Ej: +52 123 456 7890">
            </div>

            <hr class="border-gray-700 my-6">

            <h4 class="text-lg font-semibold mb-4">Cambiar Contraseña</h4>
            <p class="text-sm text-gray-500 mb-4">Deja los campos vacíos si no deseas cambiar tu contraseña</p>

            <div class="form-group">
                <label for="profile-current-password">Contraseña Actual</label>
                <input type="password" id="profile-current-password" class="portal-input">
            </div>

            <div class="form-group">
                <label for="profile-new-password">Nueva Contraseña</label>
                <input type="password" id="profile-new-password" class="portal-input">
                <div id="profile-password-requirements" class="password-requirements hidden mt-2">
                    <div class="password-requirement" data-req="length">
                        <span class="material-icons">radio_button_unchecked</span>
                        <span>Mínimo 8 caracteres</span>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-6">
                <button type="button" id="profile-cancel-btn" class="flex-1 btn-secondary">Cancelar</button>
                <button type="submit" id="profile-submit-btn" class="flex-1 btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
