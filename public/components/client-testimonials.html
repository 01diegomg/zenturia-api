<!-- Sección Testimonios -->
<section id="testimonios" class="py-20 md:py-32 testimonials-section section-bg-alt">
    <div class="container mx-auto px-6">
        <!-- Header de la sección -->
        <div class="text-center mb-12">
            <span class="badge badge-primary mb-4">
                <span class="material-icons text-sm">verified</span>
                Reseñas Verificadas
            </span>
            <h2 class="section-title">Lo Que Dicen Nuestros Clientes</h2>
            <p class="text-subtle text-lg mt-4 max-w-2xl mx-auto">
                La satisfacción de nuestros clientes es nuestra mejor carta de presentación
            </p>
        </div>

        <!-- Slider de testimonios -->
        <div class="relative">
            <div id="testimonials-slider" class="testimonials-slider custom-scrollbar pb-4">
                <!-- Los testimonios se cargarán dinámicamente -->
            </div>

            <!-- Controles del slider -->
            <button id="testimonial-prev" class="testimonial-nav-btn prev" aria-label="Testimonio anterior">
                <span class="material-icons">chevron_left</span>
            </button>
            <button id="testimonial-next" class="testimonial-nav-btn next" aria-label="Siguiente testimonio">
                <span class="material-icons">chevron_right</span>
            </button>
        </div>

        <!-- Indicadores del slider -->
        <div id="testimonial-dots" class="slider-indicators mt-8"></div>

        <!-- Badges de confianza -->
        <div class="trust-badges">
            <div class="trust-badge">
                <span class="trust-badge-value" id="trust-clients">500+</span>
                <span class="trust-badge-label">Clientes Satisfechos</span>
            </div>
            <div class="trust-badge">
                <span class="trust-badge-value flex items-center gap-1">
                    <span class="material-icons text-2xl">star</span>
                    <span id="trust-rating">4.9</span>
                </span>
                <span class="trust-badge-label">Calificación Promedio</span>
            </div>
            <div class="trust-badge">
                <span class="trust-badge-value" id="trust-years">5+</span>
                <span class="trust-badge-label">Años de Experiencia</span>
            </div>
            <div class="trust-badge">
                <span class="trust-badge-value" id="trust-services">10K+</span>
                <span class="trust-badge-label">Servicios Realizados</span>
            </div>
        </div>
    </div>
</section>
