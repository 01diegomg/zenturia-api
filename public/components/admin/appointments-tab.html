<!-- Tab: Gestión de Citas -->
<div data-tab-content="admin-appointments" class="tab-content active">
    <section class="py-8">
        <!-- Header de sección estilo Dashboard -->
        <div class="admin-section-header">
            <div class="flex items-center gap-4">
                <div class="section-icon">
                    <span class="material-icons">calendar_month</span>
                </div>
                <div class="section-info">
                    <h3>Centro de Gestión de Citas</h3>
                    <p>Administra las reservaciones y el calendario de tu negocio</p>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <!-- Buzón de Citas -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h4><span class="material-icons">inbox</span> Buzón de Citas Pendientes</h4>
                </div>
                <div class="admin-card-body">
                    <!-- Buscador de citas -->
                    <div class="search-container">
                        <input type="text"
                               id="search-appointments"
                               class="search-input"
                               placeholder="Buscar por nombre o servicio..."
                               aria-label="Buscar citas">
                        <span class="material-icons search-icon">search</span>
                        <button class="search-clear" id="search-clear-btn" aria-label="Limpiar búsqueda">
                            <span class="material-icons">close</span>
                        </button>
                    </div>
                    <div id="inbox-list" class="max-h-[400px] overflow-y-auto pr-2 space-y-3"></div>
                </div>
            </div>

            <!-- Calendario -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h4><span class="material-icons">event</span> Calendario de Reservaciones</h4>
                </div>
                <div class="admin-card-body">
                    <div class="calendar">
                        <div class="month-header">
                            <button id="admin-prev-month-btn" class="calendar-nav-btn">
                                <span class="material-icons">chevron_left</span>
                            </button>
                            <h2 id="admin-month-year" class="calendar-month-title"></h2>
                            <button id="admin-next-month-btn" class="calendar-nav-btn">
                                <span class="material-icons">chevron_right</span>
                            </button>
                        </div>
                        <div class="weekdays">
                            <div>Dom</div> <div>Lun</div> <div>Mar</div> <div>Mié</div> <div>Jue</div> <div>Vie</div> <div>Sáb</div>
                        </div>
                        <div id="admin-calendar-grid" class="calendar-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
